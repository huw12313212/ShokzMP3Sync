<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BBDEFB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="20" y="20" width="984" height="984" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Water waves at bottom -->
  <path d="M20 700 Q150 660 280 700 T540 700 T800 700 T1004 700 L1004 784 Q1004 1004 784 1004 L240 1004 Q20 1004 20 784 Z" fill="url(#wave1)"/>
  <path d="M20 750 Q180 710 340 750 T660 750 T1004 750 L1004 784 Q1004 1004 784 1004 L240 1004 Q20 1004 20 784 Z" fill="rgba(255,255,255,0.15)"/>

  <!-- Headphone / bone conduction shape -->
  <g transform="translate(512, 380)" stroke="#FFFFFF" stroke-width="36" fill="none" stroke-linecap="round">
    <!-- Headband arc -->
    <path d="M-180 60 Q-200 -120 -80 -180 Q0 -210 80 -180 Q200 -120 180 60"/>
    <!-- Left earpiece -->
    <rect x="-210" y="40" width="70" height="100" rx="20" fill="#FFFFFF" stroke="none"/>
    <!-- Right earpiece -->
    <rect x="140" y="40" width="70" height="100" rx="20" fill="#FFFFFF" stroke="none"/>
  </g>

  <!-- Music note -->
  <g transform="translate(512, 520)" fill="#FFFFFF">
    <!-- Note head -->
    <ellipse cx="-30" cy="60" rx="32" ry="24" transform="rotate(-20, -30, 60)"/>
    <ellipse cx="50" cy="40" rx="32" ry="24" transform="rotate(-20, 50, 40)"/>
    <!-- Stems -->
    <rect x="-4" y="-80" width="8" height="148"/>
    <rect x="76" y="-100" width="8" height="148"/>
    <!-- Beam -->
    <polygon points="-4,-80 84,-100 84,-80 -4,-60"/>
  </g>

  <!-- Sync arrows (circular) -->
  <g transform="translate(780, 260)" fill="#4FC3F7">
    <path d="M0-50 A50 50 0 1 1 -43 25 L-30 15 A35 35 0 1 0 0-35 Z"/>
    <polygon points="-55,18 -30,15 -38,40"/>
    <path d="M0 50 A50 50 0 1 1 43-25 L30-15 A35 35 0 1 0 0 35 Z"/>
    <polygon points="55,-18 30,-15 38,-40"/>
  </g>
</svg>

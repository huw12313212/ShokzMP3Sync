<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="20" y="20" width="984" height="984" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Water waves -->
  <clipPath id="clip">
    <rect x="20" y="20" width="984" height="984" rx="220" ry="220"/>
  </clipPath>
  <g clip-path="url(#clip)">
    <path d="M20 630 Q200 580 380 630 T740 630 T1004 630 L1004 1004 L20 1004 Z" fill="url(#wave)"/>
    <path d="M20 700 Q250 650 430 700 T800 700 T1004 700 L1004 1004 L20 1004 Z" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Bone conduction headphone - centered, thicker, bigger earpieces -->
  <g transform="translate(512, 512)" stroke="#FFFFFF" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Headband arc -->
    <path d="M-240 80 C-260 -100 -165 -260 0 -260 C165 -260 260 -100 240 80" stroke-width="78"/>
    <!-- Left earpiece -->
    <rect x="-295" y="40" width="120" height="185" rx="60" fill="#FFFFFF" stroke="none"/>
    <!-- Right earpiece -->
    <rect x="175" y="40" width="120" height="185" rx="60" fill="#FFFFFF" stroke="none"/>
  </g>
</svg>

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install yt-dlp and ffmpeg
        run: brew install yt-dlp ffmpeg

      - name: Build .app bundle
        run: bash build-app.sh

      - name: Ad-hoc code sign
        run: codesign --force --deep -s - build/ShokzMP3Sync.app

      - name: Package as zip
        run: cd build && zip -r ShokzMP3Sync-macos-arm64.zip ShokzMP3Sync.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/ShokzMP3Sync-macos-arm64.zip
          generate_release_notes: true
          body: |
            ## 安裝方式

            1. 下載 `ShokzMP3Sync-macos-arm64.zip` 並解壓縮
            2. 將 `ShokzMP3Sync.app` 拖入 `/Applications/`
            3. 開啟終端機執行以下指令解除 macOS 隔離限制：
            ```bash
            xattr -cr /Applications/ShokzMP3Sync.app
            ```
            4. 雙擊開啟即可使用

            > 需要先安裝 yt-dlp 和 ffmpeg：`brew install yt-dlp ffmpeg`
